<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #f3f7ff;
      --bg-2: #e9fff9;
      --panel: rgba(255, 255, 255, 0.88);
      --text: #142038;
      --muted: #62708b;
      --operator: #2d7fff;
      --operator-hover: #1f68da;
      --accent: #0bbf83;
      --danger: #ef476f;
      --shadow: 0 22px 56px rgba(20, 32, 56, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, #ffffff 0 12%, transparent 13%),
        radial-gradient(circle at 90% 80%, #d8fff1 0 14%, transparent 15%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    .calculator {
      width: min(360px, 100%);
      backdrop-filter: blur(14px);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: rise 520ms ease-out;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .display {
      padding: 24px 22px 18px;
      background: linear-gradient(160deg, #ffffff, #f5f9ff);
      border-bottom: 1px solid rgba(20, 32, 56, 0.08);
      text-align: right;
    }

    .display .label {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .display .value {
      margin-top: 8px;
      min-height: 54px;
      font-size: clamp(2rem, 6vw, 2.6rem);
      font-weight: 800;
      line-height: 1.15;
      word-break: break-all;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 18px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 14px 10px;
      font: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
      background: #ffffff;
      box-shadow: 0 7px 16px rgba(20, 32, 56, 0.1);
      transition: transform 130ms ease, box-shadow 130ms ease, background-color 130ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(20, 32, 56, 0.14);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 4px 10px rgba(20, 32, 56, 0.14);
    }

    .operator {
      color: #ffffff;
      background: var(--operator);
    }

    .operator:hover {
      background: var(--operator-hover);
    }

    .equals {
      color: #ffffff;
      background: var(--accent);
      grid-row: span 2;
    }

    .clear {
      color: #ffffff;
      background: var(--danger);
    }

    .zero {
      grid-column: span 2;
    }

    @media (max-width: 420px) {
      .display {
        padding: 20px 18px 14px;
      }

      .keys {
        gap: 10px;
        padding: 14px;
      }

      button {
        padding: 12px 8px;
      }
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="Calculator">
    <section class="display" aria-live="polite">
      <div class="label">Result</div>
      <div class="value" id="display">0</div>
    </section>

    <section class="keys">
      <button type="button" class="clear" data-action="clear">C</button>
      <button type="button" class="operator" data-action="operator" data-value="/">÷</button>
      <button type="button" class="operator" data-action="operator" data-value="*">×</button>
      <button type="button" class="operator" data-action="operator" data-value="-">−</button>

      <button type="button" data-action="digit" data-value="7">7</button>
      <button type="button" data-action="digit" data-value="8">8</button>
      <button type="button" data-action="digit" data-value="9">9</button>
      <button type="button" class="operator" data-action="operator" data-value="+">+</button>

      <button type="button" data-action="digit" data-value="4">4</button>
      <button type="button" data-action="digit" data-value="5">5</button>
      <button type="button" data-action="digit" data-value="6">6</button>
      <button type="button" class="equals" data-action="equals">=</button>

      <button type="button" data-action="digit" data-value="1">1</button>
      <button type="button" data-action="digit" data-value="2">2</button>
      <button type="button" data-action="digit" data-value="3">3</button>

      <button type="button" class="zero" data-action="digit" data-value="0">0</button>
    </section>
  </main>

  <script>
    const display = document.getElementById("display");

    let current = "0";
    let previous = null;
    let operator = null;
    let shouldResetCurrent = false;

    function render() {
      display.textContent = current;
    }

    function inputDigit(digit) {
      if (shouldResetCurrent) {
        current = digit;
        shouldResetCurrent = false;
      } else {
        current = current === "0" ? digit : current + digit;
      }
      render();
    }

    function chooseOperator(nextOperator) {
      if (operator && !shouldResetCurrent) {
        evaluate();
      }
      previous = Number(current);
      operator = nextOperator;
      shouldResetCurrent = true;
    }

    function evaluate() {
      if (operator === null || previous === null) {
        return;
      }

      const next = Number(current);
      let result = 0;

      if (operator === "+") result = previous + next;
      if (operator === "-") result = previous - next;
      if (operator === "*") result = previous * next;
      if (operator === "/") {
        result = next === 0 ? NaN : previous / next;
      }

      current = Number.isFinite(result) ? String(Number(result.toFixed(10))) : "Error";
      previous = null;
      operator = null;
      shouldResetCurrent = true;
      render();
    }

    function clearAll() {
      current = "0";
      previous = null;
      operator = null;
      shouldResetCurrent = false;
      render();
    }

    document.querySelector(".keys").addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      const action = button.dataset.action;
      const value = button.dataset.value;

      if (action === "digit") inputDigit(value);
      if (action === "operator") chooseOperator(value);
      if (action === "equals") evaluate();
      if (action === "clear") clearAll();
    });

    render();
  </script>
</body>
</html>
