services:
  waverider:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: waverider-mcp
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"   # MCP SSE endpoint
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      MCP_TRANSPORT: sse
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
    volumes:
      - waverider-data:/app/data
      - waverider-indices:/app/indices
    extra_hosts:
      - "host.docker.internal:host-gateway"

  neo4j:
    image: neo4j:5
    container_name: waverider-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- Optional: Uncomment to add Postgres (replaces SQLite) ----
  # postgres:
  #   image: postgres:17-bookworm
  #   container_name: waverider-postgres
  #   environment:
  #     POSTGRES_USER: waverider
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  #     POSTGRES_DB: waverider
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U waverider"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ---- Ollama: containerized, for Linux with NVIDIA GPU only ----
  # On macOS / Apple Silicon, run Ollama natively on the host for Metal
  # acceleration and use the default OLLAMA_HOST (host.docker.internal).
  # To use this container instead:
  #   1. docker compose --profile gpu up -d
  #   2. Set OLLAMA_HOST=http://ollama:11434 in your .env
  ollama:
    image: ollama/ollama:latest
    container_name: waverider-ollama
    profiles: ["gpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  waverider-data:
  waverider-indices:
  neo4j-data:
  neo4j-logs:
  # postgres-data:
  ollama-models:
