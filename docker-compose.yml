services:
  waverider:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: waverider-mcp
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - waverider-data:/app/data
      - ./indices:/app/indices:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true

  neo4j:
    image: neo4j:5
    container_name: waverider-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

